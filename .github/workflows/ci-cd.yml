name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pydantic[email]"
          python -m pip install pytest pytest-cov
          python -m pip install flake8 pylint bandit black isort mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run black
        run: black --check --diff --line-length 88 . || true
      - name: Run isort
        run: isort --check-only . || true
      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Run pylint
        run: pylint $(find . -name "*.py" -path "./venv" -prune -o -name "*.py" -print) || true
      - name: Run mypy
        run: mypy .
      - name: Run bandit
        run: bandit -r . -ll

  test:
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pydantic[email]" --force-reinstall
          python -m pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run pytest with coverage
        run: pytest --verbose --cov=. --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Check dependencies
        run: pip-audit -r requirements.txt || true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # 👇 未来要部署时，把下面这段【取消注释】，并配好密钥即可
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # 👈 部署时改成 true
          tags: yourname/ai-company-os:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-test:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to test environment
        run: echo "Deploying to test environment..."

  deploy-staging:
    needs: build
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to pre-production environment
        run: echo "Deploying to pre-production environment..."

  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production environment
        run: echo "Deploying to production environment..."

  deploy-hotfix:
    needs: build
    if: startsWith(github.ref, 'refs/heads/hotfix/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy hotfix to production
        run: echo "Deploying hotfix to production..."

  clean-up:
    needs: [deploy-test, deploy-staging, deploy-production, deploy-hotfix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Clean up
        run: echo "Cleaning up resources..."