name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run:
          python -m pip install --upgrade pip
          pip install flake8 pylint bandit pytest black isort mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run black
        run: black --check .
      - name: Run isort
        run: isort --check-only .
      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Run pylint
        run: pylint $(find . -name "*.py" -path "./venv" -prune -o -name "*.py" -print) || true
      - name: Run mypy
        run: mypy .
      - name: Run bandit
        run: bandit -r . -ll

  test:
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run:
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov
      - name: Run pytest with coverage
        run: pytest --verbose --cov=. --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Check dependencies
        run: pip-audit -r requirements.txt
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-company-os:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-test:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to test environment
        run: |
          echo "Deploying to test environment..."
          # 这里可以添加实际的部署命令，例如使用 SSH 连接到测试服务器并运行 Docker Compose
          # ssh user@test-server "cd /app && docker-compose pull && docker-compose up -d"

  deploy-staging:
    needs: build
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to pre-production environment
        run: |
          echo "Deploying to pre-production environment..."
          # 这里可以添加实际的部署命令
          # ssh user@staging-server "cd /app && docker-compose pull && docker-compose up -d"

  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production environment
        run: |
          echo "Deploying to production environment..."
          # 这里可以添加实际的部署命令
          # ssh user@production-server "cd /app && docker-compose pull && docker-compose up -d"

  deploy-hotfix:
    needs: build
    if: startsWith(github.ref, 'refs/heads/hotfix/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy hotfix to production
        run: |
          echo "Deploying hotfix to production..."
          # 这里可以添加实际的部署命令
          # ssh user@production-server "cd /app && docker-compose pull && docker-compose up -d"

  clean-up:
    needs: [deploy-test, deploy-staging, deploy-production, deploy-hotfix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Clean up
        run: |
          echo "Cleaning up resources..."
          # 这里可以添加清理命令，例如删除临时文件等
